name: Verify worker

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: carolina-slicer-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker run --rm --entrypoint node carolina-slicer-worker:ci --version
      - run: docker run --rm --entrypoint sh carolina-slicer-worker:ci -lc '! LD_LIBRARY_PATH=/opt/bambu-studio/bin ldd /opt/bambu-studio/bin/bambu-studio | grep -F "not found"'
      - run: |
          status=0
          timeout 30s docker run --rm --entrypoint xvfb-run carolina-slicer-worker:ci -a /opt/bambu-studio/AppRun --help > bambu-help.txt 2>&1 || status=$?
          test "$status" -eq 0 || test "$status" -eq 124
          grep -F "BambuStudio-" bambu-help.txt
